<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atoll</title>
  <style>
    :root {
      --bg: #f4f1eb;
      --panel: #fffdf8;
      --ink: #0e1a14;
      --muted: #5f6d66;
      --line: rgba(14, 26, 20, 0.14);
      --line-strong: rgba(14, 26, 20, 0.26);
      --orange: #f26a1b;
      --blue: #2f69d9;
      --teal: #168983;
      --purple: #7453d8;
      --red: #c74f3d;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(rgba(14, 26, 20, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14, 26, 20, 0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 34px 34px;
      color: var(--ink);
      font-family: var(--sans);
    }

    button,
    a {
      font: inherit;
    }

    .page {
      min-height: 100vh;
      overflow: hidden;
    }

    .site-header {
      align-items: center;
      background: rgba(255, 253, 248, 0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
      display: flex;
      height: 72px;
      justify-content: space-between;
      padding: 0 40px;
      position: relative;
      z-index: 20;
    }

    .brand {
      color: var(--orange);
      font-size: 22px;
      font-weight: 850;
      line-height: 1;
      text-decoration: none;
    }

    .nav {
      align-items: center;
      display: flex;
      gap: 10px;
    }

    .nav a,
    .button {
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      display: inline-flex;
      font-size: 13px;
      font-weight: 850;
      height: 42px;
      padding: 0 17px;
      text-decoration: none;
    }

    .nav a.primary,
    .button.primary {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }

    .nav a:focus-visible,
    .button:focus-visible,
    .graph-node:focus-visible {
      outline: 3px solid rgba(242, 106, 27, 0.24);
      outline-offset: 3px;
    }

    .hero {
      min-height: calc(100vh - 72px);
      padding: 76px 40px 34px;
      position: relative;
    }

    .hero::before {
      background:
        linear-gradient(90deg, rgba(244, 241, 235, 1) 0%, rgba(244, 241, 235, 0.96) 28%, rgba(244, 241, 235, 0.72) 45%, rgba(244, 241, 235, 0.2) 100%),
        linear-gradient(rgba(14, 26, 20, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14, 26, 20, 0.035) 1px, transparent 1px);
      background-size: auto, 34px 34px, 34px 34px;
      content: "";
      inset: 0;
      pointer-events: none;
      position: absolute;
      z-index: 2;
    }

    .hero-copy {
      max-width: 550px;
      position: relative;
      z-index: 6;
    }

    .eyebrow {
      color: var(--orange);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 750;
      margin: 0 0 22px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 82px;
      font-weight: 920;
      line-height: 0.94;
      margin: 0 0 24px;
      max-width: 9ch;
    }

    .lead {
      color: #26372f;
      font-size: 23px;
      font-weight: 680;
      line-height: 1.28;
      margin: 0;
      max-width: 25ch;
    }

    .copy {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.62;
      margin: 24px 0 0;
      max-width: 43ch;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }

    .status {
      align-items: center;
      bottom: 30px;
      color: var(--muted);
      display: flex;
      font-size: 13px;
      font-weight: 750;
      gap: 10px;
      left: 40px;
      position: absolute;
      z-index: 6;
    }

    .status-dot {
      background: var(--teal);
      border-radius: 50%;
      box-shadow: 0 0 0 7px rgba(22, 137, 131, 0.12);
      height: 8px;
      width: 8px;
    }

    .graph {
      inset: 0;
      pointer-events: none;
      position: absolute;
      z-index: 3;
    }

    .graph-stage {
      height: 100%;
      inset: 0;
      min-height: 620px;
      position: absolute;
      width: 100%;
    }

    .graph-lines {
      height: 100%;
      inset: 0;
      overflow: visible;
      position: absolute;
      width: 100%;
      z-index: 1;
    }

    .graph-lines path {
      fill: none;
      opacity: 0.26;
      stroke: rgba(14, 26, 20, 0.42);
      stroke-dasharray: 7 9;
      stroke-linecap: round;
      stroke-width: 1.5;
      transition: opacity 220ms ease, stroke 220ms ease, stroke-width 220ms ease;
    }

    .graph-lines path.active {
      animation: flow 1.7s linear infinite;
      opacity: 0.86;
      stroke: var(--orange);
      stroke-width: 2;
    }

    @keyframes flow {
      to {
        stroke-dashoffset: -32;
      }
    }

    .graph-node {
      background: rgba(255, 253, 248, 0.94);
      border: 1px solid var(--line);
      border-top: 4px solid var(--orange);
      box-shadow: 0 20px 60px rgba(17, 30, 23, 0.1);
      min-height: 112px;
      padding: 14px;
      pointer-events: auto;
      position: absolute;
      transform: translate(-50%, -50%);
      transition: box-shadow 220ms ease, opacity 220ms ease, transform 220ms ease;
      width: 188px;
      z-index: 4;
    }

    .graph-node.active {
      box-shadow: 0 28px 74px rgba(17, 30, 23, 0.17);
      opacity: 1;
      transform: translate(-50%, -54%);
      z-index: 8;
    }

    .graph-node.dim {
      opacity: 0.32;
    }

    .graph-node.auth {
      border-top-color: var(--purple);
    }

    .graph-node.rows {
      border-top-color: var(--blue);
    }

    .graph-node.policy {
      border-top-color: var(--red);
    }

    .graph-node.audit {
      border-top-color: var(--teal);
    }

    .node-top {
      align-items: center;
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }

    .node-name {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.1;
    }

    .node-kind {
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      flex: none;
      font-family: var(--mono);
      font-size: 9px;
      padding: 3px 7px;
      text-transform: uppercase;
    }

    .node-copy {
      color: var(--muted);
      display: block;
      font-size: 12px;
      line-height: 1.38;
      margin-top: 10px;
    }

    .node-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 12px;
    }

    .node-fields span {
      background: #ede9df;
      border-radius: 999px;
      color: #536159;
      font-family: var(--mono);
      font-size: 9px;
      padding: 3px 7px;
    }

    @media (max-width: 1100px) {
      h1 {
        font-size: 68px;
      }

      .hero-copy {
        max-width: 500px;
      }

      .graph-node {
        width: 168px;
      }
    }

    @media (max-width: 760px) {
      .site-header {
        height: 68px;
        padding: 0 18px;
      }

      .nav a:not(.primary) {
        display: none;
      }

      .hero {
        min-height: calc(100vh - 68px);
        padding: 38px 18px 78px;
      }

      .hero::before {
        background:
          linear-gradient(rgba(244, 241, 235, 0.98), rgba(244, 241, 235, 0.7)),
          linear-gradient(rgba(14, 26, 20, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(14, 26, 20, 0.035) 1px, transparent 1px);
        background-size: auto, 34px 34px, 34px 34px;
      }

      h1 {
        font-size: 48px;
        max-width: 9ch;
      }

      .lead {
        font-size: 19px;
      }

      .copy {
        font-size: 14px;
        max-width: 30ch;
      }

      .button {
        height: 42px;
        padding: 0 15px;
      }

      .status {
        bottom: 22px;
        left: 18px;
        max-width: calc(100vw - 36px);
      }

      .graph-stage {
        height: 640px;
        left: -126px;
        min-height: 640px;
        top: 44px;
        width: 780px;
      }

      .graph-node {
        min-height: 88px;
        padding: 10px;
        width: 144px;
      }

      .node-name {
        font-size: 12px;
      }

      .node-kind {
        font-size: 8px;
        padding: 2px 5px;
      }

      .node-copy {
        font-size: 10px;
        margin-top: 7px;
      }

      .node-fields {
        gap: 4px;
        margin-top: 8px;
      }

      .node-fields span {
        font-size: 8px;
        padding: 2px 5px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a class="brand" href="./">Atoll</a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="app/">Sign In</a>
        <a class="primary" href="app/">Open Studio</a>
      </nav>
    </header>

    <main class="hero" aria-labelledby="hero-title">
      <section class="hero-copy">
        <p class="eyebrow">Atoll</p>
        <h1 id="hero-title">Your database, mapped.</h1>
        <p class="lead">A live graph for schema, access, rows, and agents.</p>
        <p class="copy">Design the backend in one place. See what exists, who can touch it, and what ships.</p>
        <div class="actions">
          <a class="button primary" href="app/">Open Studio</a>
          <a class="button" href="mailto:howeej2255@gmail.com?subject=Atoll%20managed%20alpha%20request">Request access</a>
        </div>
      </section>

      <div class="graph" aria-label="Live Atoll database graph">
        <div class="graph-stage" id="graph-stage">
          <svg class="graph-lines" id="graph-lines" aria-hidden="true"></svg>
          <div id="graph-nodes"></div>
        </div>
      </div>

      <div class="status">
        <span class="status-dot" aria-hidden="true"></span>
        <span>Atoll Studio is live.</span>
      </div>
    </main>
  </div>

  <script>
    const graphNodes = [
      {
        id: "app",
        name: "app",
        kind: "edge",
        type: "app",
        x: 55,
        y: 30,
        fields: ["routes", "api"],
        copy: "The entry point."
      },
      {
        id: "auth",
        name: "auth",
        kind: "actor",
        type: "auth",
        x: 70,
        y: 22,
        fields: ["users", "sessions"],
        copy: "Humans and agents."
      },
      {
        id: "rows",
        name: "rows",
        kind: "data",
        type: "rows",
        x: 75,
        y: 48,
        fields: ["tables", "fields"],
        copy: "The protected data."
      },
      {
        id: "policy",
        name: "policy",
        kind: "rule",
        type: "policy",
        x: 62,
        y: 62,
        fields: ["read", "write"],
        copy: "Access decisions."
      },
      {
        id: "audit",
        name: "audit",
        kind: "log",
        type: "audit",
        x: 84,
        y: 70,
        fields: ["actor", "action"],
        copy: "Every touch recorded."
      }
    ];

    const graphEdges = [
      ["app", "auth"],
      ["auth", "rows"],
      ["rows", "policy"],
      ["policy", "audit"],
      ["app", "rows"],
      ["auth", "policy"]
    ];

    let activeIndex = 0;
    const stage = document.getElementById("graph-stage");
    const nodesLayer = document.getElementById("graph-nodes");
    const lines = document.getElementById("graph-lines");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getNode(id) {
      return graphNodes.find((node) => node.id === id);
    }

    function activePair() {
      return graphEdges[activeIndex % graphEdges.length];
    }

    function renderNodes() {
      const [from, to] = activePair();
      nodesLayer.innerHTML = graphNodes.map((node) => {
        const active = node.id === from || node.id === to;
        return `
          <button class="graph-node ${node.type} ${active ? "active" : "dim"}" type="button"
            data-node="${escapeHtml(node.id)}"
            style="left:${node.x}%;top:${node.y}%">
            <span class="node-top">
              <span class="node-name">${escapeHtml(node.name)}</span>
              <span class="node-kind">${escapeHtml(node.kind)}</span>
            </span>
            <span class="node-copy">${escapeHtml(node.copy)}</span>
            <span class="node-fields">${node.fields.map((field) => `<span>${escapeHtml(field)}</span>`).join("")}</span>
          </button>
        `;
      }).join("");

      nodesLayer.querySelectorAll(".graph-node").forEach((button) => {
        button.addEventListener("click", () => {
          const index = graphEdges.findIndex((edge) => edge.includes(button.dataset.node));
          if (index >= 0) {
            activeIndex = index;
            render();
          }
        });
      });
    }

    function drawLines() {
      const width = stage.clientWidth;
      const height = stage.clientHeight;
      const [activeFrom, activeTo] = activePair();
      lines.setAttribute("viewBox", `0 0 ${width} ${height}`);
      lines.innerHTML = graphEdges.map(([fromId, toId]) => {
        const from = getNode(fromId);
        const to = getNode(toId);
        const x1 = width * from.x / 100;
        const y1 = height * from.y / 100;
        const x2 = width * to.x / 100;
        const y2 = height * to.y / 100;
        const lift = Math.max(64, Math.abs(x2 - x1) * 0.42);
        const isActive = fromId === activeFrom && toId === activeTo;
        return `<path class="${isActive ? "active" : ""}" d="M${x1} ${y1} C${x1 + lift} ${y1}, ${x2 - lift} ${y2}, ${x2} ${y2}"></path>`;
      }).join("");
    }

    function render() {
      renderNodes();
      drawLines();
    }

    window.addEventListener("resize", drawLines);
    render();

    window.setInterval(() => {
      activeIndex = (activeIndex + 1) % graphEdges.length;
      render();
    }, 2400);
  </script>
</body>
</html>
